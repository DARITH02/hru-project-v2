services:
  # ⚙️ Laravel Application (PHP + Nginx)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app_two
    ports:
      - "80:8080"
      - "8080:8080"
    environment:
      - PORT=8080
      - APP_URL=http://localhost:8080
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=attendance_db_two
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - ALLOW_STUDENT_CODE_LOGIN=true
    volumes:
      - .:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - attendance_net

  # 🗄️ MySQL Database
  mysql:
    image: mysql:8.0
    container_name: mysql_db_two
    restart: always
    environment:
      MYSQL_DATABASE: attendance_db_two
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - attendance_net

  # ⚡ Redis Cache
  redis:
    image: redis:7
    container_name: redis_cache_two
    networks:
      - attendance_net

  # 🌐 phpMyAdmin (NEW)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_two
    restart: always
    ports:
      - "8082:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql
    networks:
      - attendance_net

networks:
  attendance_net:

volumes:
  mysql_data:
