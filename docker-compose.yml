services:
  # ⚙️ Laravel Application (PHP + Nginx)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hru_ats_back-app
    container_name: laravel_app_two
    ports:
      - "${APP_HTTP_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_KEY=${APP_KEY:-base64:aoIY9eHBtbJ8rusjvaJkG/bFgBaQSUKzlWwK9k+H+gk=}
      - APP_URL=${APP_URL:-http://localhost:8080}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - STUDENT_QR_PUBLIC_URL=${STUDENT_QR_PUBLIC_URL:-${APP_URL:-http://localhost:8080}}
      - SANCTUM_STATEFUL_DOMAINS=${SANCTUM_STATEFUL_DOMAINS:-localhost,localhost:80,localhost:3000,localhost:3001,localhost:5173,localhost:8080,127.0.0.1,127.0.0.1:80,127.0.0.1:3000,127.0.0.1:3001,127.0.0.1:5173,127.0.0.1:8080,192.168.18.2:3000,192.168.18.2:3001,192.168.18.2:5173,192.168.18.2:8080,192.168.18.10:8080}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=attendance_db_two
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_CLIENT=phpredis
      - ALLOW_STUDENT_CODE_LOGIN=true
      - PUBLIC_REGISTRATION_ENABLED=${PUBLIC_REGISTRATION_ENABLED:-true}
      - DEMO_LOGIN_ENABLED=${DEMO_LOGIN_ENABLED:-true}
      - SUPER_ADMIN_KEY=${SUPER_ADMIN_KEY:-hru_manager}
      - MAIL_MAILER=${MAIL_MAILER:-log}
      - MAIL_SCHEME=${MAIL_SCHEME:-null}
      - MAIL_HOST=${MAIL_HOST:-127.0.0.1}
      - MAIL_PORT=${MAIL_PORT:-2525}
      - MAIL_USERNAME=${MAIL_USERNAME:-null}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-null}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-hello@example.com}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-${APP_NAME:-Laravel}}
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=hru-ats
      - REVERB_APP_KEY=hru-ats-key
      - REVERB_APP_SECRET=hru-ats-secret
      - REVERB_HOST=reverb
      - REVERB_PORT=8091
      - REVERB_SCHEME=http
    volumes:
      - .:/var/www
      - composer_vendor:/var/www/vendor
      - vite_build:/var/www/public/build
    depends_on:
      - mysql
      - redis
      - reverb
    restart: unless-stopped
    networks:
      - attendance_net

  # 🔌 Laravel Reverb WebSocket Server
  reverb:
    image: hru_ats_back-app
    container_name: laravel_reverb_two
    command: php artisan reverb:start --host=0.0.0.0 --port=8091
    ports:
      - "8091:8091"
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_KEY=${APP_KEY:-base64:aoIY9eHBtbJ8rusjvaJkG/bFgBaQSUKzlWwK9k+H+gk=}
      - APP_URL=${APP_URL:-http://localhost:8080}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - STUDENT_QR_PUBLIC_URL=${STUDENT_QR_PUBLIC_URL:-${APP_URL:-http://localhost:8080}}
      - SANCTUM_STATEFUL_DOMAINS=${SANCTUM_STATEFUL_DOMAINS:-localhost,localhost:80,localhost:3000,localhost:3001,localhost:5173,localhost:8080,127.0.0.1,127.0.0.1:80,127.0.0.1:3000,127.0.0.1:3001,127.0.0.1:5173,127.0.0.1:8080,192.168.18.2:3000,192.168.18.2:3001,192.168.18.2:5173,192.168.18.2:8080,192.168.18.10:8080}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=attendance_db_two
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_CLIENT=phpredis
      - ALLOW_STUDENT_CODE_LOGIN=true
      - PUBLIC_REGISTRATION_ENABLED=${PUBLIC_REGISTRATION_ENABLED:-true}
      - DEMO_LOGIN_ENABLED=${DEMO_LOGIN_ENABLED:-true}
      - SUPER_ADMIN_KEY=${SUPER_ADMIN_KEY:-hru_manager}
      - MAIL_MAILER=${MAIL_MAILER:-log}
      - MAIL_SCHEME=${MAIL_SCHEME:-null}
      - MAIL_HOST=${MAIL_HOST:-127.0.0.1}
      - MAIL_PORT=${MAIL_PORT:-2525}
      - MAIL_USERNAME=${MAIL_USERNAME:-null}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-null}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-hello@example.com}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-${APP_NAME:-Laravel}}
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=hru-ats
      - REVERB_APP_KEY=hru-ats-key
      - REVERB_APP_SECRET=hru-ats-secret
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8091
      - REVERB_SCHEME=http
    volumes:
      - .:/var/www
      - composer_vendor:/var/www/vendor
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - attendance_net

  # ⚙️ Laravel Queue Worker
  queue:
    image: hru_ats_back-app
    container_name: laravel_queue_two
    command: php artisan queue:work --sleep=3 --tries=1 --timeout=1800
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_KEY=${APP_KEY:-base64:aoIY9eHBtbJ8rusjvaJkG/bFgBaQSUKzlWwK9k+H+gk=}
      - APP_URL=${APP_URL:-http://localhost:8080}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - STUDENT_QR_PUBLIC_URL=${STUDENT_QR_PUBLIC_URL:-${APP_URL:-http://localhost:8080}}
      - SANCTUM_STATEFUL_DOMAINS=${SANCTUM_STATEFUL_DOMAINS:-localhost,localhost:80,localhost:3000,localhost:3001,localhost:5173,localhost:8080,127.0.0.1,127.0.0.1:80,127.0.0.1:3000,127.0.0.1:3001,127.0.0.1:5173,127.0.0.1:8080,192.168.18.2:3000,192.168.18.2:3001,192.168.18.2:5173,192.168.18.2:8080,192.168.18.10:8080}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=attendance_db_two
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_CLIENT=phpredis
      - ALLOW_STUDENT_CODE_LOGIN=true
      - PUBLIC_REGISTRATION_ENABLED=${PUBLIC_REGISTRATION_ENABLED:-true}
      - DEMO_LOGIN_ENABLED=${DEMO_LOGIN_ENABLED:-true}
      - SUPER_ADMIN_KEY=${SUPER_ADMIN_KEY:-hru_manager}
      - MAIL_MAILER=${MAIL_MAILER:-log}
      - MAIL_SCHEME=${MAIL_SCHEME:-null}
      - MAIL_HOST=${MAIL_HOST:-127.0.0.1}
      - MAIL_PORT=${MAIL_PORT:-2525}
      - MAIL_USERNAME=${MAIL_USERNAME:-null}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-null}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-hello@example.com}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-${APP_NAME:-Laravel}}
    volumes:
      - .:/var/www
      - composer_vendor:/var/www/vendor
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - attendance_net

  # ⏱️ Laravel Scheduler
  scheduler:
    image: hru_ats_back-app
    container_name: laravel_scheduler_two
    command: php artisan schedule:work
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_KEY=${APP_KEY:-base64:aoIY9eHBtbJ8rusjvaJkG/bFgBaQSUKzlWwK9k+H+gk=}
      - APP_URL=${APP_URL:-http://localhost:8080}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - STUDENT_QR_PUBLIC_URL=${STUDENT_QR_PUBLIC_URL:-${APP_URL:-http://localhost:8080}}
      - SANCTUM_STATEFUL_DOMAINS=${SANCTUM_STATEFUL_DOMAINS:-localhost,localhost:80,localhost:3000,localhost:3001,localhost:5173,localhost:8080,127.0.0.1,127.0.0.1:80,127.0.0.1:3000,127.0.0.1:3001,127.0.0.1:5173,127.0.0.1:8080,192.168.18.2:3000,192.168.18.2:3001,192.168.18.2:5173,192.168.18.2:8080,192.168.18.10:8080}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=attendance_db_two
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_CLIENT=phpredis
      - ALLOW_STUDENT_CODE_LOGIN=true
      - PUBLIC_REGISTRATION_ENABLED=${PUBLIC_REGISTRATION_ENABLED:-true}
      - DEMO_LOGIN_ENABLED=${DEMO_LOGIN_ENABLED:-true}
      - SUPER_ADMIN_KEY=${SUPER_ADMIN_KEY:-hru_manager}
    volumes:
      - .:/var/www
      - composer_vendor:/var/www/vendor
    depends_on:
      - mysql
      - redis
      - queue
    restart: unless-stopped
    networks:
      - attendance_net

  # 🗄️ MySQL Database
  mysql:
    image: mysql:8.0
    container_name: mysql_db_two
    restart: always
    environment:
      MYSQL_DATABASE: attendance_db_two
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - attendance_net

  # ⚡ Redis Cache
  redis:
    image: redis:7
    container_name: redis_cache_two
    restart: unless-stopped
    networks:
      - attendance_net

  # 🌐 phpMyAdmin (NEW)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_two
    restart: always
    ports:
      - "8082:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql
    networks:
      - attendance_net

networks:
  attendance_net:

volumes:
  mysql_data:
  composer_vendor:
  vite_build:
